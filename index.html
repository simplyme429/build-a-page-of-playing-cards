<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<main id="playing-cards">

  <!-- Card 1 -->
  <div class="card red">
    <div class="left">
      A
      <div>♥</div>
    </div>

    <div class="middle">
      ♥
    </div>

    <div class="right">
      <div>♥</div>
      A
    </div>
  </div>

  <!-- Card 2 -->
  <div class="card">
    <div class="left">
      K
      <div>♠</div>
    </div>

    <div class="middle">
      ♠
    </div>

    <div class="right">
      <div>♠</div>
      K
    </div>
  </div>

  <!-- Card 3 -->
  <div class="card red">
    <div class="left">
      Q
      <div>♦</div>
    </div>

    <div class="middle">
      ♦
    </div>

    <div class="right">
      <div>♦</div>
      Q
    </div>
  </div>

</main>

</body>
</html>
